<!DOCTYPE html> 
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alke Wallet - Depositar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow p-4 mx-auto" style="max-width: 500px;">
            <a href="menu.html" class="text-decoration-none mb-3 d-block">← Volver al Menú</a>
            <h2>Depositar Fondos</h2>
            <form id="depositForm" class="mt-3">
                <div class="mb-3">
                    <label for="amount" class="form-label">Monto a depositar ($)</label>
                    <input type="number" class="form-control" id="amount" min="1" required>
                </div>
                <button type="submit" class="btn btn-success w-100">Confirmar Depósito</button>
            </form>
        </div>
    </div>
    <script src="js/main.js"></script>
</body>
</html>
