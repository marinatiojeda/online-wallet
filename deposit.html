<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billetera digital - Depositar Fondos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
        <div class="container">
            <a class="navbar-brand" href="menu.html">Billetera digital</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="menu.html">Inicio</a>
                <a class="nav-link active" href="deposit.html">Depositar</a>
                <a class="nav-link" href="sendmoney.html">Enviar Dinero</a>
                <a class="nav-link" href="transactions.html">Movimientos</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="card shadow p-4 mx-auto" style="max-width: 500px;">
            <a href="menu.html" class="text-decoration-none mb-3 d-block">← Volver al Menú</a>
            <h2 class="mb-4 text-center">Depositar Fondos</h2>
            
            <form id="depositForm">
                <div class="mb-3">
                    <label for="amount" class="form-label">Monto a Depositar ($)</label>
                    <input type="number" class="form-control form-control-lg" id="amount" min="1" required placeholder="Ej: 50000">
                </div>
                <button type="submit" class="btn btn-success btn-lg w-100">Confirmar Depósito</button>
            </form>
            
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
