<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alke Wallet - Enviar Dinero</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow p-4 mb-4">
                    <a href="menu.html" class="text-decoration-none mb-3 d-block">← Volver al Menú</a>
                    <h2>Enviar Dinero</h2>
                    <form id="sendForm" class="mt-3">
                        <div class="mb-3">
                            <label for="searchContact" class="form-label">Buscar Contacto</label>
                            <input type="text" class="form-control" id="searchContact" placeholder="Escribe el nombre..." required>
                        </div>
                        <div class="mb-3">
                            <label for="sendAmount" class="form-label">Monto a enviar ($)</label>
                            <input type="number" class="form-control" id="sendAmount" min="1" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Enviar Dinero</button>
                    </form>
                </div>
                
                <div class="card shadow p-4">
                    <h4>Mis Contactos Frecuentes</h4>
                    <ul class="list-group mt-2" id="contactList">
                        <li class="list-group-item">Rodrigo Morales</li>
                        <li class="list-group-item">Dayana Gonzalez</li>
                        <li class="list-group-item">Francisca Peña</li>
                        <li class="list-group-item">Antonella Peña</li>
                        <li class="list-group-item">Agustin Morales</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
    <script src="js/main.js"></script>
</body>
</html>
